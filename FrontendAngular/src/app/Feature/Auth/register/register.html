<div class="register-container">
  <form [formGroup]="registerForm" class="register-form">
    <h2>{{ isOtpSent ? 'Xác thực OTP' : 'Đăng ký tài khoản' }}</h2>

    <ng-container *ngIf="!isOtpSent">
      <div class="form-group">
        <label for="fullName">Họ và tên</label>
        <input id="fullName" formControlName="fullName" type="text">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" formControlName="email" type="email">
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input id="password" formControlName="password" type="password">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input id="confirmPassword" formControlName="confirmPassword" type="password">
      </div>
      <button type="button" (click)="onSendOtp()" [disabled]="isLoading" class="submit-btn">
        {{ isLoading ? 'Đang gửi...' : 'Gửi mã OTP' }}
      </button>
    </ng-container>

    <ng-container *ngIf="isOtpSent">
      <div class="form-group">
        <label for="otp">Nhập mã xác thực đã gửi tới {{ registerForm.get('email')?.value }}</label>
        <input id="otp" formControlName="otp" type="text" placeholder="Nhập mã OTP">
      </div>
      <button type="button" (click)="onRegister()" [disabled]="isLoading" class="submit-btn">
        {{ isLoading ? 'Đang đăng ký...' : 'Xác nhận & Đăng ký' }}
      </button>
    </ng-container>

    <p *ngIf="message" class="message-box">{{ message }}</p>
  </form>
</div>
