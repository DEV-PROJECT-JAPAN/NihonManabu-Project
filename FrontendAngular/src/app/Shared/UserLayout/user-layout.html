<div class="app-layout-wrapper">

    <aside class="app-sidebar">
        <div class="sidebar-brand">
            <img [src]="'/assets/img/logo.png'" alt="NihonManabu Logo" class="brand-logo">
        </div>

        <nav class="sidebar-menu">
            <a href="javascript:void(0)" class="menu-item" (click)="goToKanji()" [class.active]="checkActive('kanji')">
                <i class="fas fa-book"></i> <span>Hán từ</span>
            </a>
            <a href="javascript:void(0)" class="menu-item" (click)="goToVocabulary()"
                [class.active]="checkActive('vocabulary')">
                <i class="fas fa-book"></i> <span>Từ vựng</span>
            </a>

            <a href="javascript:void(0)" (click)="goToGrammar()" [class.active]="checkActive('grammar')"
                class="menu-item">
                <i class="fas fa-bullhorn"></i> <span>Ngữ pháp</span>
            </a>

            <a href="javascript:void(0)" class="menu-item"><i class="fas fa-route"></i> <span>Lộ trình</span></a>
            <a href="javascript:void(0)" class="menu-item"><i class="fas fa-chart-line"></i> <span>Ghi nhớ</span></a>
            <a href="javascript:void(0)" class="menu-item"><i class="fas fa-user-friends"></i> <span>Chủ động</span></a>
            <a href="javascript:void(0)" class="menu-item"><i class="fas fa-headphones"></i> <span>Shadowing</span></a>
            <a href="javascript:void(0)" class="menu-item premium-link"><i class="fas fa-bolt"></i> <span>Nâng
                    cấp</span></a>
        </nav>

        <div class="sidebar-footer">
            <a href="javascript:void(0)" class="menu-item setting-btn"><i class="fas fa-cog"></i> <span>Cài
                    đặt</span></a>
        </div>
    </aside>

    <main class="app-main-content">
        <header class="app-top-navbar d-flex justify-content-end align-items-center px-4">
            <div class="navbar-actions d-flex align-items-center gap-3">
                <button class="nav-icon-btn" title="Thành tích"><i class="fas fa-trophy"></i></button>
                <button class="nav-icon-btn" title="Thông báo"><i class="fas fa-bell"></i></button>
                <button class="btn btn-sm login-btn"><i class="fas fa-sign-in-alt mr-1"></i> Đăng nhập</button>
            </div>
        </header>

        <section class="content-body">
            <router-outlet></router-outlet>
        </section>
    </main>

</div>
<style>
    /* =========================================================================
   🌐 BỘ KHUNG LAYOUT TỔNG THỂ (FLEXBOX MATRIX)
   ========================================================================= */
    .app-layout-wrapper {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #0b0f19;
        /* Tối ưu nền sâu thẳm giảm mỏi mắt */
        color: #f1f5f9;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* =========================================================================
   🧭 THANH SIDEBAR BÊN TRÁI (ADMIN/USER NAVIGATION)
   ========================================================================= */
    .app-sidebar {
        width: 250px;
        /* Tăng nhẹ 10px để chữ không bị gột ngạt */
        height: 100%;
        background-color: #070a13;
        /* Đậm hơn nền main tạo chiều sâu tách khối rõ ràng */
        border-right: 1px solid rgba(255, 255, 255, 0.04);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        flex-shrink: 0;
    }

    /* Khu vực bọc Logo */
    .sidebar-brand {
        height: 80px;
        /* Cố định chiều cao khối Brand */
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Đẩy flexbox căn thẳng hàng ngay giữa */
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* Tối ưu lại chiếc Logo thanh thoát */
    .brand-logo {
        /* 🌟 BƯỚC 1: Đẩy mạnh chiều cao lên để phần chữ to rõ hơn */
        height: 160px;
        /* Tăng từ 38px lên 60px hoặc 65px để bù khoảng trống ảnh gốc */

        /* 🌟 BƯỚC 2: Mở rộng giới hạn chiều rộng */
        width: auto;
        max-width: 500px;
        /* Cho phép mở rộng tối đa ra 200px cho thoải mái */

        object-fit: contain;
        display: block;
        margin: 0 auto;
        /* Giữ nguyên căn giữa sidebar */
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .brand-logo:hover {
        transform: scale(1.04);
        /* Hiệu ứng nổi nhẹ khi di chuột */
    }

    /* Menu danh sách điều hướng */
    .sidebar-menu {
        display: flex;
        flex-direction: column;
        gap: 6px;
        /* Tăng khoảng cách giữa các nút */
        padding: 20px 14px;
        flex-grow: 1;
    }

    .menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 11px 16px;
        color: #94a3b8;
        font-size: 14px;
        font-weight: 500;
        border-radius: 8px;
        text-decoration: none !important;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
    }

    .menu-item i {
        width: 20px;
        font-size: 15px;
        text-align: center;
        color: #64748b;
        /* Icon mờ hơn chữ tạo điểm nhấn phụ trung thực */
        transition: color 0.2s ease;
    }

    /* Trạng thái Hover của Menu chuột */
    .menu-item:hover {
        color: #ffffff;
        background-color: rgba(255, 255, 255, 0.03);
    }

    .menu-item:hover i {
        color: #94a3b8;
    }

    /* 🌟 Trạng thái ACTIVE (Đang đứng ở trang đó) - Đã làm mềm hiệu ứng */
    .menu-item.active {
        color: #ffffff;
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        /* Phát quang nhẹ tinh tế */
    }

    .menu-item.active i {
        color: #ffffff;
    }

    /* Menu tài khoản Premium hoàng gia */
    .premium-link {
        color: #f59e0b !important;
        background: rgba(245, 158, 11, 0.03);
        border: 1px solid rgba(245, 158, 11, 0.08);
    }

    .premium-link i {
        color: #f59e0b;
    }

    .premium-link:hover {
        background: rgba(245, 158, 11, 0.08) !important;
        border-color: rgba(245, 158, 11, 0.2);
        box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);
    }

    .sidebar-footer {
        padding: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* =========================================================================
   🖥️ STYLE VÙNG NỘI DUNG CHÍNH BÊN PHẢI (MAIN APP PLATFORM)
   ========================================================================= */
    .app-main-content {
        flex-grow: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background-color: #0b121f;
    }

    /* Thanh Navbar trên đỉnh */
    .app-top-navbar {
        height: 64px;
        background-color: #070a13;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        flex-shrink: 0;
    }

    .nav-icon-btn {
        background: transparent;
        border: none;
        color: #64748b;
        font-size: 16px;
        cursor: pointer;
        padding: 8px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }

    .nav-icon-btn:hover {
        color: #f1f5f9;
        background-color: rgba(255, 255, 255, 0.03);
    }

    /* Nút đăng nhập phong cách Minimalist */
    .login-btn {
        background-color: transparent;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #cbd5e1;
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px;
        padding: 6px 16px;
        transition: all 0.2s ease-in-out;
    }

    .login-btn:hover {
        background-color: #ffffff;
        color: #070a13;
        border-color: #ffffff;
        box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
    }

    /* Vùng thân chứa nội dung chính bài tập */
    .content-body {
        flex-grow: 1;
        overflow-y: auto;
        padding: 24px;
        /* Tăng đệm rộng rãi chuẩn Dashboard quốc tế */
    }

    /* 🏆 Custom Thanh Cuộn dọc (Scrollbar) High-class */
    .content-body::-webkit-scrollbar {
        width: 6px;
    }

    .content-body::-webkit-scrollbar-track {
        background: transparent;
    }

    .content-body::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
    }

    .content-body::-webkit-scrollbar-thumb:hover {
        background: #334155;
    }
</style>

<div class="thought-bubble" id="aiThoughtBubble" *ngIf="isBubbleOpen">
    <button class="bubble-close" (click)="closeBubble()">✕ ĐÓNG</button>

    <div *ngIf="isLoading" class="loading-status-zone">
        <span class="loading-spinner"></span>
        <span>Hệ thống đang tra cứu tài liệu...</span>
    </div>

    <div *ngIf="!isLoading" class="bubble-content" [innerHTML]="bubbleContent"></div>
</div>

<div id="anime-mascot-container">
    <div class="bot-toggle-wrapper">
        <span class="toggle-label" [style.color]="isBotActive ? '#4fd1c5' : '#718096'">
            {{ isBotActive ? 'Trợ lý: ON' : 'Trợ lý: OFF' }}
        </span>
        <input type="checkbox" id="bot-switch" [(ngModel)]="isBotActive" (change)="closeBubble()" />
        <label for="bot-switch" class="switch-slider"></label>
    </div>

    <div class="pure-anime-bot" (click)="isBubbleOpen = !isBubbleOpen">
        <div class="robot-head" [class.bot-searching]="isLoading" [class.bot-sleep]="!isBotActive">
            <div class="robot-ears"></div>
            <div class="robot-face">
                <div class="robot-eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
            </div>
        </div>
        <div class="bot-pulse" *ngIf="isBotActive"></div>
    </div>
</div>

<style>
    #anime-mascot-container {
        position: fixed;
        bottom: 25px;
        right: 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 9999;
        font-family: 'Segoe UI', Roboto, sans-serif;
    }

    /* ---- TẠO HÌNH ROBOT CƠ KHÍ ---- */
    .pure-anime-bot {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        animation: floating 3s ease-in-out infinite;
    }

    .robot-head {
        position: relative;
        width: 68px;
        height: 60px;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 3px solid #63b3ed;
        border-radius: 20px 20px 16px 16px;
        box-shadow: 0 8px 25px rgba(66, 153, 225, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
        transition: all 0.3s ease;
    }

    /* Trạng thái tắt nguồn (OFF) */
    .robot-head.bot-sleep {
        border-color: #475569 !important;
        box-shadow: none !important;
    }

    .robot-head.bot-sleep .eye {
        background: #475569 !important;
        box-shadow: none !important;
    }

    /* Trạng thái đang tra cứu dữ liệu */
    .robot-head.bot-searching {
        border-color: #4fd1c5 !important;
        box-shadow: 0 0 20px rgba(79, 209, 197, 0.6);
        animation: ledBlinking 1s infinite alternate;
    }

    .robot-head.bot-searching .eye {
        background: #4fd1c5 !important;
        box-shadow: 0 0 8px #4fd1c5 !important;
    }

    .robot-eyes {
        display: flex;
        gap: 14px;
    }

    .eye {
        width: 10px;
        height: 10px;
        background: #63b3ed;
        border-radius: 50%;
        box-shadow: 0 0 6px #63b3ed;
        transition: all 0.3s ease;
    }

    .robot-ears::before,
    .robot-ears::after {
        content: '';
        position: absolute;
        width: 6px;
        height: 16px;
        background: #475569;
        top: 50%;
        transform: translateY(-50%);
        border-radius: 3px;
    }

    .robot-ears::before {
        left: -6px;
    }

    .robot-ears::after {
        right: -6px;
    }

    .pure-anime-bot:hover .robot-head:not(.bot-sleep) {
        transform: scale(1.05);
        border-color: #4fd1c5;
    }

    .bot-pulse {
        position: absolute;
        width: 80px;
        height: 30px;
        background: rgba(99, 179, 237, 0.2);
        border-radius: 50%;
        bottom: -5px;
        z-index: 1;
        animation: pulseWave 2s infinite linear;
    }

    /* ---- 🌟 SỬA ĐỔI TOÀN DIỆN BONG BÓNG CHAT (FIXED POSITION) ---- */
    .thought-bubble {
        position: fixed;
        /* Chuyển từ absolute sang fixed */
        bottom: 165px;
        /* Đẩy khoảng cách chuẩn lên trên đỉnh đầu */
        right: 25px;
        /* Căn lề chuẩn trùng khớp với container của robot */
        width: 340px;
        max-height: 400px;
        background-color: #1e293b;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        color: #f1f5f9;
        border: 2px solid #475569;
        z-index: 99999;
        /* Đảm bảo nằm trên mọi thành phần giao diện */
        animation: bubbleFadeIn 0.25s ease-out;
    }

    .thought-bubble::after {
        content: '';
        position: absolute;
        bottom: -10px;
        right: 45px;
        border-width: 10px 10px 0;
        border-style: solid;
        border-color: #1e293b transparent;
        display: block;
    }

    .loading-status-zone {
        color: #4fd1c5;
        font-size: 13.5px;
        margin-bottom: 10px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .loading-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(79, 209, 197, 0.2);
        border-top-color: #4fd1c5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    .bubble-content {
        overflow-y: auto;
        font-size: 14px;
        line-height: 1.5;
    }

    .bubble-content h3 {
        margin: 5px 0 10px 0;
        color: #63b3ed;
        font-size: 15px;
        border-bottom: 1px solid #334155;
        padding-bottom: 4px;
    }

    .bubble-content strong {
        color: #f6ad55;
        background: #334155;
        padding: 1px 4px;
        border-radius: 4px;
    }

    .bubble-content .bullet-item {
        display: block;
        margin-bottom: 4px;
    }

    .bubble-close {
        align-self: flex-end;
        background: #334155;
        border: none;
        color: #fc8181;
        font-weight: bold;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 6px;
        margin-bottom: 8px;
        cursor: pointer;
    }

    /* ---- CÔNG TẮC SWITCH BAN ĐÊM (TOGGLE) ---- */
    .bot-toggle-wrapper {
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #1e293b;
        padding: 4px 12px;
        border-radius: 16px;
        border: 1px solid #334155;
    }

    .toggle-label {
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 0.5px;
    }

    #bot-switch {
        display: none;
    }

    .switch-slider {
        width: 32px;
        height: 18px;
        background-color: #475569;
        border-radius: 9px;
        position: relative;
        cursor: pointer;
        margin: 0;
        transition: 0.3s;
    }

    .switch-slider::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        border-radius: 50%;
        transition: 0.3s;
    }

    #bot-switch:checked+.switch-slider {
        background-color: #319795;
    }

    #bot-switch:checked+.switch-slider::before {
        transform: translateX(14px);
    }

    /* ---- ĐỘNG HỌC ANIMATIONS ---- */
    @keyframes floating {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-6px);
        }
    }

    @keyframes pulseWave {
        0% {
            transform: scale(0.8);
            opacity: 1;
        }

        100% {
            transform: scale(1.3);
            opacity: 0;
        }
    }

    @keyframes bubbleFadeIn {
        from {
            opacity: 0;
            transform: translateY(10px) scale(0.98);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    @keyframes ledBlinking {
        from {
            opacity: 1;
        }

        to {
            opacity: 0.6;
        }
    }
</style>
