<div class="app-layout-wrapper">

    <aside class="app-sidebar">
        <div class="sidebar-brand">
            <a routerLink="/" style="text-decoration: none; display: flex; align-items: center;">
                <span class="brand-name">NihonManabu</span>
            </a>
        </div>

        <nav class="sidebar-menu">
            <a routerLink="/grammar/levels"
               routerLinkActive="active"
               class="menu-item">
                <i class="fas fa-chess-knight"></i>
                <span>Hiển thị</span>
            </a>

            <a href="javascript:void(0)"
               class="menu-item"
               (click)="goToVocabulary()"
               [class.active]="checkActive('vocabulary')">
                <i class="fas fa-book"></i>
                <span>Từ vựng</span>
            </a>

            <a routerLink="/grammar/levels"
               routerLinkActive="active"
               class="menu-item">
                <i class="fas fa-bullhorn"></i>
                <span>Ngữ pháp</span>
            </a>

            <a href="javascript:void(0)" class="menu-item">
                <i class="fas fa-route"></i>
                <span>Lộ trình</span>
            </a>
            
            <a routerLink="/practice" routerLinkActive="active" class="menu-item">
                <i class="fas fa-chart-line"></i>
                <span>Ghi nhớ</span>
            </a>
            
            <a href="javascript:void(0)" class="menu-item">
                <i class="fas fa-user-friends"></i>
                <span>Chủ động</span>
            </a>
            
            <a href="javascript:void(0)" class="menu-item">
                <i class="fas fa-headphones"></i>
                <span>Shadowing</span>
            </a>
            
            <a href="javascript:void(0)" class="menu-item premium-link">
                <i class="fas fa-bolt"></i>
                <span>Nâng cấp</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="javascript:void(0)" class="menu-item setting-btn">
                <i class="fas fa-cog"></i>
                <span>Cài đặt</span>
            </a>
        </div>
    </aside>

    <main class="app-main-content">
        <header class="app-top-navbar d-flex justify-content-end align-items-center px-4 py-3">
            <div class="navbar-actions d-flex align-items-center gap-3">
                <button class="nav-icon-btn"><i class="fas fa-trophy"></i></button>
                <button class="nav-icon-btn"><i class="fas fa-bell"></i></button>
                
                @if (authService.currentUser()) {
                    <div class="profile-dropdown-wrapper">
                        <button class="avatar-toggle-btn" (click)="toggleDropdown($event)">
                            <i class="fas fa-user-circle"></i>
                            <span class="ms-2 d-none d-md-inline" style="font-size: 13px; font-weight: 600;">
                                {{ authService.currentUser()?.role }}
                            </span>
                            <i class="fas fa-chevron-down ms-1 arrow-icon" [class.rotated]="isDropdownOpen"></i>
                        </button>

                        @if (isDropdownOpen) {
                            <div class="profile-mini-dropdown">
                                <div class="dropdown-header">
                                    <div style="font-weight: 700; color: #fff; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                                        {{ authService.currentUser()?.userName }}
                                    </div>
                                </div>
                                <hr class="dropdown-divider">
                                
                               <a [routerLink]="['/auth/profile']" class="dropdown-item" (click)="isDropdownOpen = false">
                                    <i class="fas fa-id-card me-2"></i> Hồ sơ cá nhân
                                </a>
                                
                                <a routerLink="/auth/login" class="dropdown-item logout-action" (click)="onLogout()">
                                    <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                                </a>
                            </div>
                        }
                    </div>
                } @else {
                    <button class="btn btn-sm btn-outline-light px-3 login-btn"
                            routerLink="auth/login">
                        <i class="fas fa-sign-in-alt me-1"></i>
                        Đăng nhập
                    </button>
                }
            </div>
        </header>

        <section class="content-body">
            <router-outlet></router-outlet>
        </section>
    </main>

</div>

<style>
    /* Phần Style CSS của bạn bên dưới giữ nguyên vẹn 100% */
    .app-layout-wrapper {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #0F172A;
        color: #F1F5F9;
    }
    .app-sidebar {
        width: 240px;
        height: 100%;
        background-color: #0B0F19;
        border-right: 1px solid #1E293B;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        flex-shrink: 0;
    }
    .sidebar-brand {
        padding: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .brand-name {
        font-size: 16px;
        font-weight: 800;
        color: #FFFFFF;
        letter-spacing: 0.5px;
    }
    .sidebar-menu {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 16px 12px;
        flex-grow: 1;
    }
    .menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        color: #94A3B8;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        text-decoration: none !important;
        transition: all 0.2s ease;
    }
    .menu-item i {
        width: 18px;
        font-size: 16px;
        text-align: center;
    }
    .menu-item:hover {
        color: #FFFFFF;
        background: rgba(255, 255, 255, 0.03);
    }
    .menu-item.active {
        color: #FFFFFF;
        background: #3B82F6;
    }
    .premium-link {
        color: #F59E0B !important;
    }
    .premium-link:hover {
        background: rgba(245, 158, 11, 0.1) !important;
    }
    .sidebar-footer {
        padding: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.03);
    }
    .app-main-content {
        flex-grow: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .app-top-navbar {
        height: 64px;
        background-color: #0F172A;
        border-bottom: 1px solid #1E293B;
        flex-shrink: 0;
    }
    .nav-icon-btn {
        background: transparent;
        border: none;
        color: #94A3B8;
        font-size: 18px;
        cursor: pointer;
        padding: 6px 10px;
        transition: color 0.2s ease;
    }
    .nav-icon-btn:hover {
        color: #FFFFFF;
    }
    .login-btn {
        border-color: #334155;
        color: #CBD5E1;
        font-weight: 600;
        border-radius: 8px;
    }
    .login-btn:hover {
        background: #3B82F6;
        border-color: #3B82F6;
    }
    .content-body {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px 0;
    }
    .content-body::-webkit-scrollbar {
        width: 6px;
    }
    .content-body::-webkit-scrollbar-thumb {
        background: #1E293B;
        border-radius: 10px;
    }
</style>
