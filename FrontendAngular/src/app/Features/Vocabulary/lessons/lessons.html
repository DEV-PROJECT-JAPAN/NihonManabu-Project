<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<div class="container py-5">
    <div class="container py-5">
        <div class="d-flex align-items-center mb-5">
            <a routerLink="/vocabulary/levels" class="btn btn-light rounded-circle me-3 shadow-sm p-2 text-dark">
                <i class="fa-solid fa-arrow-left fs-5"></i>
            </a>
            <h2 class="fw-black text-White m-0">Danh sách bài học</h2>
        </div>

        <div class="row g-4">
            @for (les of lessons; track les.id) {
            <div class="col-12 col-md-6 col-lg-4">
                <a [routerLink]="['/vocabulary/list', levelId, les.id]" class="text-decoration-none d-block h-100">
                    <div class="card border-0 shadow-sm p-4 h-100 d-flex flex-column justify-content-between hover-card-jlpt"
                        style="border-radius: 18px; background: white; border-left: 6px solid #ff9f43 !important;">
                        <div class="mb-3">
                            <h5 class="fw-black text-dark m-0">{{ les.title }}</h5>
                        </div>
                        <div
                            class="pt-2 border-top border-light d-flex justify-content-between align-items-center text-muted small">
                            <span><i class="fa-solid fa-list-ol me-1"></i>Thứ tự bài: {{ les.order }}</span>
                            <span class="text-warning fw-bold">Vào học <i
                                    class="fa-solid fa-chevron-right ms-1 small"></i></span>
                        </div>
                    </div>
                </a>
            </div>
            } @empty {
            <div class="col-12 text-center text-muted mt-4">
                <p>Chưa có bài học nào cho cấp độ này.</p>
            </div>
            }
        </div>
    </div>
