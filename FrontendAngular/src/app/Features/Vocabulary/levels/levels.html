<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<div class="container py-5">
    <div class="mb-5 text-center text-md-start">
        <h2 class="fw-black text-white display-6 mb-2">
            <i class="fa-solid fa-graduation-cap text-primary me-2"></i>Chọn cấp độ JLPT
        </h2>
        <p class="text-white fs-5">Hãy chọn cấp độ phù hợp để bắt đầu lộ trình học từ vựng hiệu quả.</p>
    </div>
    <div class="row g-4">
        @for (lvl of levels; track lvl.id) {
        <div class="col-12 col-md-6 col-lg-4">
            <a href="javascript:void(0)" (click)="selectLevel(lvl.id)">

                <div class="card h-100 border-0 shadow-sm p-4 hover-card-jlpt position-relative overflow-hidden"
                    style="border-radius: 20px; background: #ffffff;">
                    <div class="position-absolute top-0 start-0 h-100" style="width: 6px; background-color: #4f46e5;">
                    </div>

                    <div class="ps-2">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <h1 class="fw-black m-0 text-indigo display-5">{{ lvl.name }}</h1>
                            <span class="badge bg-indigo-subtle text-indigo rounded-pill px-3 py-2 fw-bold">Học
                                ngay</span>
                        </div>
                        <p class="text-secondary fw-medium m-0 fs-6 leading-relaxed">
                            {{ lvl.description }}
                        </p>
                    </div>
                </div>
            </a>
        </div>
        }
    </div>
</div>
