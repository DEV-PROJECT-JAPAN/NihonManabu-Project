<div class="page-header">
  <div class="page-title"><i class="fas fa-graduation-cap"></i> TRUNG TÂM ÔN TẬP</div>
  <div class="page-subtitle">{{ pageSubtitle }}</div>
</div>

@if (currentView === 'menu') {
  <app-practice-menu 
    (onSelectSystem)="openSystemVocab()" 
    (onSelectFolders)="openFoldersView()">
  </app-practice-menu>
}

@if (currentView === 'system' || currentView === 'folder-gacha') {
  <app-practice-gachavocabulary
    [vocabList]="activeSystemVocabList" 
    [title]="activeTitle"
    (onBack)="currentView === 'system' ? goToMenu() : openFoldersView()">
  </app-practice-gachavocabulary>
}

@if (currentView === 'folders') {
  <app-practice-userfolder
    [folders]="activeFolderList"
    (onBack)="goToMenu()"
    (onSelectFolder)="handleOpenFolder($event)"
    (onDeleteFolder)="handleDeleteFolder($event)"
    (onUploadNewFolder)="handleUploadFolder($event)">
  </app-practice-userfolder>
}
