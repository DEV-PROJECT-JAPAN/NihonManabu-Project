<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow-sm p-4">
        <h4 class="text-warning mb-3">📝 Cập Nhật Cấp Độ</h4>
        <hr />

        @if (isLoading()) {
        <div class="text-center py-5">
            <div class="spinner-border text-warning mb-2" role="status">
                <span class="visually-hidden">Đang tải dữ liệu...</span>
            </div>
            <p class="text-muted">Đang tải thông tin cấp độ...</p>
        </div>
        } @else {
        @if (errorMessage()) {
        <div class="alert alert-danger mb-3">
            {{ errorMessage() }}
        </div>
        }

        <form [formGroup]="levelForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label class="form-label fw-bold">Tên cấp độ <span class="text-danger">*</span></label>
                <input type="text" class="form-control"
                    [class.is-invalid]="levelForm.get('name')?.invalid && levelForm.get('name')?.touched"
                    formControlName="name" />

                @if (levelForm.get('name')?.hasError('required') && levelForm.get('name')?.touched) {
                <div class="invalid-feedback">
                    Tên cấp độ không được để trống.
                </div>
                }
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Mô tả chi tiết</label>
                <textarea class="form-control" rows="3" formControlName="description"></textarea>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a routerLink="/admin/level" class="btn btn-secondary">Hủy bỏ</a>

                <button type="submit" class="btn btn-warning px-4" [disabled]="isSubmitting()">
                    @if (isSubmitting()) {
                    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    Đang xử lý...
                    } @else {
                    Cập nhật
                    }
                </button>
            </div>
        </form>
        }
    </div>
</div>
