<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<div class="container py-4">
    <div class="custom-breadcrumb">
        <a [routerLink]="['/grammar']" class="breadcrumb-step"><i class="fas fa-home mr-1"></i> Trang chủ</a>
        <span class="breadcrumb-separator"><i class="fas fa-chevron-right"></i></span>
        <span class="breadcrumb-step active-step">🎯 Trình độ</span>
    </div>

    <div class="card custom-card">
        <div class="card-header">
            <i class="fas fa-book-open text-success mr-2"></i> Bước 2: Chọn bài học thực hành
        </div>
        <div class="card-body p-4">
            <div class="lesson-modern-grid">
                @for (les of lessons; track les.id) {
                <a [routerLink]="['/grammar/level', levelId, 'lesson', les.id]" class="lesson-modern-item">
                    <span class="number">Bài {{ les.order }}</span>
                    <span class="sub-text">Lesson</span>
                </a>
                }
            </div>
        </div>
    </div>
</div>
